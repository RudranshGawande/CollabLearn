<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>CollabLearn - Sign Up</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        indigo: {
                            600: '#4f46e5',
                            700: '#4338ca',
                        }
                    },
                    borderRadius: {
                        '2xl': '16px',
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .soft-shadow {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">
    <main class="w-full max-w-md bg-white rounded-3xl soft-shadow overflow-hidden p-8">
        <header class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-600 rounded-2xl mb-4 shadow-lg shadow-indigo-200">
                <i class="text-white w-8 h-8" data-lucide="user-plus"></i>
            </div>
            <h1 class="text-3xl font-bold text-slate-900 tracking-tight">Create Account</h1>
            <p class="text-slate-500 mt-2 font-medium">Join the CollabLearn community today.</p>
        </header>

        <form class="space-y-5">
            <!-- Full Name -->
            <div class="space-y-2">
                <label class="block text-sm font-semibold text-slate-700 ml-1" for="name">Full Name</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="h-5 w-5 text-slate-400" data-lucide="user"></i>
                    </div>
                    <input class="block w-full pl-11 pr-4 py-3.5 bg-slate-50 border-transparent rounded-2xl focus:ring-2 focus:ring-indigo-600 focus:bg-white focus:border-transparent transition-all duration-200 text-slate-900 placeholder:text-slate-400" id="name" placeholder="John Doe" required="" type="text"/>
                </div>
            </div>

            <!-- Email -->
            <div class="space-y-2">
                <label class="block text-sm font-semibold text-slate-700 ml-1" for="email">Email</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="h-5 w-5 text-slate-400" data-lucide="mail"></i>
                    </div>
                    <input class="block w-full pl-11 pr-4 py-3.5 bg-slate-50 border-transparent rounded-2xl focus:ring-2 focus:ring-indigo-600 focus:bg-white focus:border-transparent transition-all duration-200 text-slate-900 placeholder:text-slate-400" id="email" placeholder="name@example.com" required="" type="email"/>
                </div>
            </div>

            <!-- Password -->
            <div class="space-y-2">
                <label class="block text-sm font-semibold text-slate-700 ml-1" for="password">Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="h-5 w-5 text-slate-400" data-lucide="lock"></i>
                    </div>
                    <input class="block w-full pl-11 pr-4 py-3.5 bg-slate-50 border-transparent rounded-2xl focus:ring-2 focus:ring-indigo-600 focus:bg-white focus:border-transparent transition-all duration-200 text-slate-900 placeholder:text-slate-400" id="password" placeholder="••••••••" required="" type="password"/>
                </div>
            </div>

            <!-- Signup Button -->
            <button onclick="submitSignup()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-indigo-200 transition-all duration-200 active:scale-[0.98] focus:outline-none focus:ring-4 focus:ring-indigo-100 mt-4" type="button">
                Create Account
            </button>
        </form>

        <footer class="mt-8 text-center">
            <p class="text-slate-500 text-sm font-medium">
                Already have an account? 
                <button onclick="Android.onLoginClicked()" class="text-indigo-600 font-bold hover:underline decoration-2 underline-offset-4">Login</button>
            </p>
        </footer>
    </main>

    <script>
        function submitSignup() {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (name && email && password) {
                Android.onSignupSubmitted(name, email, password);
            } else {
                alert('Please fill all fields');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
        });
    </script>
</body>
</html>
