<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CollabLearn - Login</title>
<!-- Tailwind CSS CDN with plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            indigo: {
              600: '#4f46e5',
              700: '#4338ca',
            }
          },
          borderRadius: {
            '2xl': '16px',
          }
        }
      }
    }
  </script>
<!-- Google Fonts: Inter for a modern look -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Lucide Icons for Material-style icons -->
<script src="https://unpkg.com/lucide@latest"></script>
<style data-purpose="typography">
    body {
      font-family: 'Inter', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
  </style>
<style data-purpose="custom-shadows">
    .soft-shadow {
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
    }
  </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">
<!-- BEGIN: LoginContainer -->
<main class="w-full max-w-md bg-white rounded-2xl soft-shadow overflow-hidden p-8" data-purpose="login-card">
<!-- BEGIN: BrandHeader -->
<header class="text-center mb-10" data-purpose="brand-identity">
<div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-600 rounded-2xl mb-4 shadow-lg shadow-indigo-200">
<i class="text-white w-8 h-8" data-lucide="users"></i>
</div>
<h1 class="text-3xl font-bold text-slate-900 tracking-tight">CollabLearn</h1>
<p class="text-slate-500 mt-2 font-medium">Learn together, solve better.</p>
</header>
<!-- END: BrandHeader -->
<!-- BEGIN: LoginForm -->
<form action="#" class="space-y-6" data-purpose="credential-entry" method="POST">
<!-- Email Input Field -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-slate-700 ml-1" for="email">Email</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<i class="h-5 w-5 text-slate-400" data-lucide="mail"></i>
</div>
<input class="block w-full pl-11 pr-4 py-3.5 bg-slate-50 border-transparent rounded-2xl focus:ring-2 focus:ring-indigo-600 focus:bg-white focus:border-transparent transition-all duration-200 text-slate-900 placeholder:text-slate-400" id="email" name="email" placeholder="name@example.com" required="" type="email"/>
</div>
</div>
<!-- Password Input Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="block text-sm font-semibold text-slate-700" for="password">Password</label>
<a class="text-xs font-semibold text-indigo-600 hover:text-indigo-700" href="#">Forgot Password?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<i class="h-5 w-5 text-slate-400" data-lucide="lock"></i>
</div>
<input class="block w-full pl-11 pr-4 py-3.5 bg-slate-50 border-transparent rounded-2xl focus:ring-2 focus:ring-indigo-600 focus:bg-white focus:border-transparent transition-all duration-200 text-slate-900 placeholder:text-slate-400" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Login Button -->
<button onclick="Android.onLoginClicked()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-indigo-200 transition-all duration-200 active:scale-[0.98] focus:outline-none focus:ring-4 focus:ring-indigo-100" data-purpose="primary-action-button" type="button">
        Login
      </button>
</form>
<!-- END: LoginForm -->
<!-- BEGIN: FooterLinks -->
<footer class="mt-8 text-center" data-purpose="navigation-footer">
<p class="text-slate-500 text-sm">
        Don't have an account? 
        <a class="text-indigo-600 font-bold hover:underline decoration-2 underline-offset-4" href="#">Sign Up</a>
</p>
</footer>
<!-- END: FooterLinks -->
</main>
<!-- END: LoginContainer -->
<script data-purpose="icon-initialization">
    /* Initialize Lucide icons after DOM content is loaded */
    document.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();
    });
  </script>
</body></html>
