<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#6D28D9", /* Violet-700 / Primary */
                        "background-light": "#F8F7FF",
                        "background-dark": "#121022",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .custom-shadow {
            box-shadow: 0 4px 20px -2px rgba(109, 40, 217, 0.08);
        }
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen font-display text-slate-900 dark:text-slate-100">
<div class="max-w-md mx-auto min-h-screen flex flex-col bg-white dark:bg-slate-900 shadow-xl">
<!-- TopAppBar -->
<header class="flex items-center p-4 sticky top-0 bg-white dark:bg-slate-900 z-10">
<button onclick="Android.onBackClicked()" class="size-10 flex items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-slate-700 dark:text-slate-200">arrow_back</span>
</button>
<h1 class="ml-2 text-xl font-bold tracking-tight text-slate-900 dark:text-slate-100">Ask a Doubt</h1>
</header>
<main class="flex-1 px-5 pb-24 overflow-y-auto">
<!-- Illustration / Decorative Element -->
<div class="mt-4 mb-8 p-6 bg-primary/5 dark:bg-primary/10 rounded-xl flex items-center gap-4">
<div class="bg-primary/20 p-3 rounded-full">
<span class="material-symbols-outlined text-primary text-3xl">lightbulb</span>
</div>
<div>
<p class="text-sm font-semibold text-primary">Need help?</p>
<p class="text-xs text-slate-500 dark:text-slate-400">Our experts and AI are ready to help you solve any problem.</p>
</div>
</div>
<!-- Select Subject -->
<div class="mb-6">
<label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-2 px-1">Select Subject</label>
<div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-4 shadow-sm">
<div class="space-y-3">
<label class="flex items-center p-3 rounded-lg border-2 border-primary bg-primary/5 cursor-pointer transition-all hover:bg-primary/10">
<input type="radio" name="subject" value="math" checked class="sr-only peer">
<div class="w-5 h-5 rounded-full border-2 border-primary peer-checked:bg-primary peer-checked:ring-2 peer-checked:ring-primary/20 flex items-center justify-center mr-3">
<div class="w-2 h-2 rounded-full bg-white hidden peer-checked:block"></div>
</div>
<div class="flex items-center justify-between flex-1">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">calculate</span>
<span class="font-semibold text-slate-900 dark:text-white">Mathematics</span>
</div>
<span class="text-xs text-slate-500 dark:text-slate-400">Algebra, Calculus, Geometry</span>
</div>
</label>
<label class="flex items-center p-3 rounded-lg border-2 border-slate-200 dark:border-slate-600 cursor-pointer transition-all hover:border-primary/50 hover:bg-slate-50 dark:hover:bg-slate-700">
<input type="radio" name="subject" value="physics" class="sr-only peer">
<div class="w-5 h-5 rounded-full border-2 border-slate-400 peer-checked:border-primary peer-checked:bg-primary peer-checked:ring-2 peer-checked:ring-primary/20 flex items-center justify-center mr-3">
<div class="w-2 h-2 rounded-full bg-white hidden peer-checked:block"></div>
</div>
<div class="flex items-center justify-between flex-1">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-blue-500">science</span>
<span class="font-semibold text-slate-900 dark:text-white">Physics</span>
</div>
<span class="text-xs text-slate-500 dark:text-slate-400">Mechanics, Thermodynamics, Optics</span>
</div>
</label>
<label class="flex items-center p-3 rounded-lg border-2 border-slate-200 dark:border-slate-600 cursor-pointer transition-all hover:border-primary/50 hover:bg-slate-50 dark:hover:bg-slate-700">
<input type="radio" name="subject" value="chemistry" class="sr-only peer">
<div class="w-5 h-5 rounded-full border-2 border-slate-400 peer-checked:border-primary peer-checked:bg-primary peer-checked:ring-2 peer-checked:ring-primary/20 flex items-center justify-center mr-3">
<div class="w-2 h-2 rounded-full bg-white hidden peer-checked:block"></div>
</div>
<div class="flex items-center justify-between flex-1">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-green-500">biotech</span>
<span class="font-semibold text-slate-900 dark:text-white">Chemistry</span>
</div>
<span class="text-xs text-slate-500 dark:text-slate-400">Organic, Inorganic, Physical</span>
</div>
</label>
<label class="flex items-center p-3 rounded-lg border-2 border-slate-200 dark:border-slate-600 cursor-pointer transition-all hover:border-primary/50 hover:bg-slate-50 dark:hover:bg-slate-700">
<input type="radio" name="subject" value="biology" class="sr-only peer">
<div class="w-5 h-5 rounded-full border-2 border-slate-400 peer-checked:border-primary peer-checked:bg-primary peer-checked:ring-2 peer-checked:ring-primary/20 flex items-center justify-center mr-3">
<div class="w-2 h-2 rounded-full bg-white hidden peer-checked:block"></div>
</div>
<div class="flex items-center justify-between flex-1">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-emerald-500">eco</span>
<span class="font-semibold text-slate-900 dark:text-white">Biology</span>
</div>
<span class="text-xs text-slate-500 dark:text-slate-400">Botany, Zoology, Genetics</span>
</div>
</label>
<label class="flex items-center p-3 rounded-lg border-2 border-slate-200 dark:border-slate-600 cursor-pointer transition-all hover:border-primary/50 hover:bg-slate-50 dark:hover:bg-slate-700">
<input type="radio" name="subject" value="other" class="sr-only peer">
<div class="w-5 h-5 rounded-full border-2 border-slate-400 peer-checked:border-primary peer-checked:bg-primary peer-checked:ring-2 peer-checked:ring-primary/20 flex items-center justify-center mr-3">
<div class="w-2 h-2 rounded-full bg-white hidden peer-checked:block"></div>
</div>
<div class="flex items-center justify-between flex-1">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-orange-500">menu_book</span>
<span class="font-semibold text-slate-900 dark:text-white">Other Subjects</span>
</div>
<span class="text-xs text-slate-500 dark:text-slate-400">Computer Science, Economics, etc.</span>
</div>
</label>
</div>
</div>
</div>
<!-- Your Doubt -->
<div class="mb-6">
<label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-2 px-1">Your Doubt</label>
<textarea class="w-full min-h-[180px] p-4 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary text-slate-900 dark:text-white placeholder:text-slate-400 transition-all resize-none" placeholder="Type your doubt here... Be as specific as possible."></textarea>
</div>
<!-- Upload Image -->
<div class="mb-8">
<div class="relative">
<input type="file" accept="image/*" class="sr-only" id="image-upload">
<label for="image-upload" class="w-full flex flex-col items-center justify-center gap-3 h-20 border-2 border-dashed border-primary/40 bg-gradient-to-br from-primary/5 to-primary/10 hover:from-primary/10 hover:to-primary/20 rounded-xl transition-all cursor-pointer group">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary group-hover:scale-110 transition-transform">add_a_photo</span>
<span class="font-semibold text-primary">Upload Image (Optional)</span>
</div>
<span class="text-xs text-slate-500 dark:text-slate-400">PNG, JPG up to 10MB</span>
</label>
</div>
</div>
<!-- AI Hint Toggle -->
<div class="flex items-center justify-between p-4 bg-slate-50 dark:bg-slate-800 rounded-xl border border-slate-100 dark:border-slate-700 mb-8">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">auto_fix_high</span>
<div>
<p class="text-sm font-bold text-slate-800 dark:text-slate-200">Get AI hint first</p>
<p class="text-xs text-slate-500">Quick suggestions before a helper joins</p>
</div>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-primary"></div>
</label>
</div>
</main>
<!-- Bottom CTA -->
<div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-5 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-t border-slate-100 dark:border-slate-800">
<button class="w-full h-14 bg-primary hover:bg-primary/90 text-white font-bold rounded-xl shadow-lg shadow-primary/20 flex items-center justify-center gap-2 transition-transform active:scale-95">
<span class="material-symbols-outlined">search</span>
                Find Helper Now
            </button>
</div>
</div>
</body></html>
