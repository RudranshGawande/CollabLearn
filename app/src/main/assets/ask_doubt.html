<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#4f46e5",
                        "background-light": "#ffffff",
                        "surface": "#f8fafc",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .custom-shadow {
            box-shadow: 0 4px 20px -2px rgba(79, 70, 229, 0.08); /* Updated shadow color to match indigo */
        }
        body {
            font-family: 'Inter', sans-serif;
            min-height: max(884px, 100dvh);
            background-color: #ffffff;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
  </head>
<body class="bg-background-light text-slate-900 min-h-screen flex flex-col font-display">
<div class="max-w-md mx-auto min-h-screen flex flex-col bg-white">
<!-- Top Bar -->
<header class="sticky top-0 z-50 flex items-center p-4 bg-white/90 backdrop-blur-md border-b border-slate-100">
<button onclick="Android.onBackClicked()" class="size-10 flex items-center justify-center rounded-full bg-slate-100 text-slate-600 hover:bg-slate-200 transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="ml-4 text-xl font-bold tracking-tight text-slate-900">Ask a Doubt</h1>
</header>
<main class="flex-1 px-6 pb-24 overflow-y-auto">
<!-- Info Card -->
<div class="mt-6 mb-8 p-5 bg-indigo-50 border border-indigo-100 rounded-xl flex items-center gap-4">
<div class="bg-primary/10 p-3 rounded-full">
<span class="material-symbols-outlined text-primary text-2xl">school</span>
</div>
<div>
<p class="text-xs font-bold text-primary uppercase tracking-widest mb-0.5">Quick Help</p>
<p class="text-sm font-medium text-indigo-900">Peers and AI are ready to help you solve any problem.</p>
</div>
</div>
<!-- Select Subject (Custom Dropdown) -->
<div class="mb-6" id="subject-dropdown-container">
    <label class="block text-sm font-bold text-slate-700 mb-2 px-1">Select Subject</label>
    <div class="relative">
        <!-- Dropdown Trigger -->
        <button id="dropdown-trigger" class="w-full h-16 flex items-center justify-between px-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary text-slate-900 transition-all outline-none shadow-sm group">
            <div class="flex items-center gap-3">
                <div id="selected-icon-container" class="size-10 rounded-lg bg-primary/10 flex items-center justify-center text-primary group-focus:scale-110 transition-transform">
                    <span id="selected-icon" class="material-symbols-outlined">auto_stories</span>
                </div>
                <span id="selected-text" class="font-bold text-slate-700">Mathematics</span>
            </div>
            <span id="dropdown-arrow" class="material-symbols-outlined text-slate-400 transition-transform duration-300">expand_more</span>
        </button>

        <!-- Dropdown Options -->
        <div id="dropdown-options" class="hidden absolute top-[calc(100%+8px)] left-0 right-0 bg-white border border-slate-100 rounded-2xl shadow-xl shadow-slate-200/50 z-[100] overflow-hidden transform origin-top transition-all duration-300 scale-95 opacity-0">
            <div class="p-2 space-y-1">
                <button onclick="selectSubject('math', 'Mathematics', 'function')" class="w-full flex items-center justify-between p-3 rounded-xl hover:bg-slate-50 transition-colors group">
                    <div class="flex items-center gap-3">
                        <div class="size-9 rounded-lg bg-blue-50 flex items-center justify-center text-blue-600">
                            <span class="material-symbols-outlined">function</span>
                        </div>
                        <span class="font-semibold text-slate-600 group-hover:text-slate-900">Mathematics</span>
                    </div>
                </button>
                <button onclick="selectSubject('physics', 'Physics', 'architecture')" class="w-full flex items-center justify-between p-3 rounded-xl hover:bg-slate-50 transition-colors group">
                    <div class="flex items-center gap-3">
                        <div class="size-9 rounded-lg bg-orange-50 flex items-center justify-center text-orange-600">
                            <span class="material-symbols-outlined">architecture</span>
                        </div>
                        <span class="font-semibold text-slate-600 group-hover:text-slate-900">Physics</span>
                    </div>
                </button>
                <button onclick="selectSubject('chemistry', 'Chemistry', 'science')" class="w-full flex items-center justify-between p-3 rounded-xl hover:bg-slate-50 transition-colors group">
                    <div class="flex items-center gap-3">
                        <div class="size-9 rounded-lg bg-emerald-50 flex items-center justify-center text-emerald-600">
                            <span class="material-symbols-outlined">science</span>
                        </div>
                        <span class="font-semibold text-slate-600 group-hover:text-slate-900">Chemistry</span>
                    </div>
                </button>
                <button onclick="selectSubject('biology', 'Biology', 'psychology')" class="w-full flex items-center justify-between p-3 rounded-xl hover:bg-slate-50 transition-colors group">
                    <div class="flex items-center gap-3">
                        <div class="size-9 rounded-lg bg-pink-50 flex items-center justify-center text-pink-600">
                            <span class="material-symbols-outlined">psychology</span>
                        </div>
                        <span class="font-semibold text-slate-600 group-hover:text-slate-900">Biology</span>
                    </div>
                </button>
                <button onclick="selectSubject('other', 'Other Subjects', 'more_horiz')" class="w-full flex items-center justify-between p-3 rounded-xl hover:bg-slate-50 transition-colors group">
                    <div class="flex items-center gap-3">
                        <div class="size-9 rounded-lg bg-slate-100 flex items-center justify-center text-slate-600">
                            <span class="material-symbols-outlined">more_horiz</span>
                        </div>
                        <span class="font-semibold text-slate-600 group-hover:text-slate-900">Other Subjects</span>
                    </div>
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    const dropdownTrigger = document.getElementById('dropdown-trigger');
    const dropdownOptions = document.getElementById('dropdown-options');
    const dropdownArrow = document.getElementById('dropdown-arrow');
    const selectedText = document.getElementById('selected-text');
    const selectedIcon = document.getElementById('selected-icon');
    let isOpen = false;

    function toggleDropdown() {
        isOpen = !isOpen;
        if (isOpen) {
            dropdownOptions.classList.remove('hidden');
            setTimeout(() => {
                dropdownOptions.classList.add('scale-100', 'opacity-100');
                dropdownOptions.classList.remove('scale-95', 'opacity-0');
            }, 10);
            dropdownArrow.style.transform = 'rotate(180deg)';
        } else {
            dropdownOptions.classList.add('scale-95', 'opacity-0');
            dropdownOptions.classList.remove('scale-100', 'opacity-100');
            dropdownArrow.style.transform = 'rotate(0deg)';
            setTimeout(() => {
                dropdownOptions.classList.add('hidden');
            }, 300);
        }
    }

    function selectSubject(value, label, icon) {
        selectedText.innerText = label;
        selectedIcon.innerText = icon;
        toggleDropdown();
        // You can store the value in a hidden input if needed for form submission
    }

    dropdownTrigger.addEventListener('click', toggleDropdown);

    // Close when clicking outside
    document.addEventListener('click', (e) => {
        if (!document.getElementById('subject-dropdown-container').contains(e.target) && isOpen) {
            toggleDropdown();
        }
    });
</script>
<!-- Your Doubt -->
<div class="mb-6">
<label class="block text-sm font-bold text-slate-700 mb-2 px-1">Detailed Description</label>
<textarea class="w-full min-h-[160px] p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary text-slate-900 placeholder:text-slate-400 transition-all resize-none shadow-sm" placeholder="Type your doubt here... Be as specific as possible."></textarea>
</div>
<!-- Upload Image -->
<div class="mb-8">
<div class="relative">
<input type="file" accept="image/*" class="sr-only" id="image-upload">
<label for="image-upload" class="w-full flex items-center justify-center gap-3 h-16 border-2 border-dashed border-slate-200 bg-slate-50 hover:bg-slate-100 rounded-xl transition-all cursor-pointer group">
<span class="material-symbols-outlined text-slate-400 group-hover:text-primary group-hover:scale-110 transition-all">add_a_photo</span>
<span class="font-bold text-slate-600 group-hover:text-primary transition-colors">Upload Image (Optional)</span>
</label>
</div>
</div>
<!-- AI Hint Toggle -->
<div class="flex items-center justify-between p-4 bg-emerald-50 rounded-xl border border-emerald-100 mb-8">
<div class="flex items-center gap-3">
<div class="p-2 bg-emerald-100 rounded-lg text-emerald-600">
<span class="material-symbols-outlined text-[20px]">auto_fix_high</span>
</div>
<div>
<p class="text-sm font-bold text-emerald-900">Get AI guidance first</p>
<p class="text-[11px] text-emerald-700/80 font-medium leading-tight">Quick hints before a peer joins the session</p>
</div>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-emerald-500"></div>
</label>
</div>
</main>
<!-- Bottom Navbar/CTA -->
<div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-5 bg-white/95 backdrop-blur-md border-t border-slate-100">
<button class="w-full h-14 bg-primary text-white font-bold rounded-xl shadow-lg shadow-primary/25 flex items-center justify-center gap-2 hover:opacity-90 active:scale-95 transition-all">
<span class="material-symbols-outlined">search</span>
                Find Helper Now
            </button>
</div>
</div>
</body></html>
